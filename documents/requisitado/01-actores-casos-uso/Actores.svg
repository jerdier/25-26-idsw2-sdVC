981,344.2969 M337.0981,329.2969 L350.0981,344.2969" style="stroke:#181818;stroke-width:0.5;" fill="none"/><text x="277.81" y="358.792" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="118.5762" font-family="sans-serif">DirectorDeGrado</text></g><!--entity Secretaria--><g class="entity" data-qualified-name="Secretaria" id="ent0004" data-source-line="9"><ellipse cx="80.5083" cy="162.2969" rx="8" ry="8" fill="#F1F1F1" style="stroke:#181818;stroke-width:0.5;"/><path d="M80.5083,170.2969 L80.5083,197.2969 M67.5083,178.2969 L93.5083,178.2969 M80.5083,197.2969 L67.5083,212.2969 M80.5083,197.2969 L93.5083,212.2969" style="stroke:#181818;stroke-width:0.5;" fill="none"/><text x="6" y="226.792" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="149.0166" font-family="sans-serif">SecretariaAcademica</text></g><!--entity Admin--><g class="entity" data-qualified-name="Admin" id="ent0005" data-source-line="10"><ellipse cx="80.51" cy="51.2969" rx="8" ry="8" fill="#F1F1F1" style="stroke:#181818;stroke-width:0.5;"/><path d="M80.51,59.2969 L80.51,86.2969 M67.51,67.2969 L93.51,67.2969 M80.51,86.2969 L67.51,101.2969 M80.51,86.2969 L93.51,101.2969" style="stroke:#181818;stroke-width:0.5;" fill="none"/><text x="30.97" y="115.792" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="99.0801" font-family="sans-serif">Administrador</text></g><g class="entity" data-qualified-name="GMN7" id="ent0008" data-source-line="16"><path d="M222.67,502.2469 L222.67,557.6453 L451.5367,557.6453 L451.5367,512.2469 L441.5367,502.2469 L222.67,502.2469" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><path d="M441.5367,502.2469 L441.5367,512.2469 L451.5367,512.2469 L441.5367,502.2469" style="stroke:#181818;stroke-width:1;" fill="#FEFFDD"/><text x="228.67" y="519.3138" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="60.7026" font-weight="700" font-family="sans-serif">Alumno:</text><text x="228.67" y="534.4466" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="144.1553" font-family="sans-serif">Solicita y consulta sus</text><text x="228.67" y="549.5794" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="207.8667" font-family="sans-serif">propias solicitudes de dispensa.</text></g><g class="entity" data-qualified-name="GMN10" id="ent0011" data-source-line="22"><path d="M215.02,396.6869 L215.02,467.2181 L459.1846,467.2181 L459.1846,406.6869 L449.1846,396.6869 L215.02,396.6869" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><path d="M449.1846,396.6869 L449.1846,406.6869 L459.1846,406.6869 L449.1846,396.6869" style="stroke:#181818;stroke-width:1;" fill="#FEFFDD"/><text x="221.02" y="413.7538" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="67.6216" font-weight="700" font-family="sans-serif">Profesor:</text><text x="221.02" y="428.8866" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="180.1084" font-family="sans-serif">Gestiona sesiones de clase,</text><text x="221.02" y="444.0194" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="189.7251" font-family="sans-serif">registra toma de asistencia y</text><text x="221.02" y="459.1522" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="223.1646" font-family="sans-serif">consulta expedientes de alumnos.</text></g><g class="entity" data-qualified-name="GMN13" id="ent0014" data-source-line="29"><path d="M519.18,288.6869 L519.18,359.2181 L774.5355,359.2181 L774.5355,298.6869 L764.5355,288.6869 L519.18,288.6869" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><path d="M764.5355,288.6869 L764.5355,298.6869 L774.5355,298.6869 L764.5355,288.6869" style="stroke:#181818;stroke-width:1;" fill="#FEFFDD"/><text x="525.18" y="305.7538" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="136.2017" font-weight="700" font-family="sans-serif">Director de Grado:</text><text x="525.18" y="320.8866" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="222.771" font-family="sans-serif">Hereda las funciones del Profesor.</text><text x="525.18" y="336.0194" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="230.2231" font-family="sans-serif">Revisa, evalúa y guarda la decisión</text><text x="525.18" y="351.1522" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="163.8457" font-family="sans-serif">final sobre las dispensas.</text></g><g class="entity" data-qualified-name="GMN16" id="ent0017" data-source-line="36"><path d="M222.44,156.6869 L222.44,227.2181 L451.7637,227.2181 L451.7637,166.6869 L441.7637,156.6869 L222.44,156.6869" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><path d="M441.7637,156.6869 L441.7637,166.6869 L451.7637,166.6869 L441.7637,156.6869" style="stroke:#181818;stroke-width:1;" fill="#FEFFDD"/><text x="228.44" y="173.7538" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="164.6074" font-weight="700" font-family="sans-serif">Secretaría Académica:</text><text x="228.44" y="188.8866" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="199.6465" font-family="sans-serif">Importa y gestiona matrículas,</text><text x="228.44" y="204.0194" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="208.3237" font-family="sans-serif">alumnos y dispensas. Ejecuta el</text><text x="228.44" y="219.1522" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="174.0146" font-family="sans-serif">cierre del ciclo académico.</text></g><g class="entity" data-qualified-name="GMN19" id="ent0020" data-source-line="43"><path d="M218.27,45.6869 L218.27,116.2181 L455.9282,116.2181 L455.9282,55.6869 L445.9282,45.6869 L218.27,45.6869" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><path d="M445.9282,45.6869 L445.9282,55.6869 L455.9282,55.6869 L445.9282,45.6869" style="stroke:#181818;stroke-width:1;" fill="#FEFFDD"/><text x="224.27" y="62.7538" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="110.062" font-weight="700" font-family="sans-serif">Administrador:</text><text x="224.27" y="77.8866" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="201.9507" font-family="sans-serif">Gestiona el ciclo de vida de los</text><text x="224.27" y="93.0194" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="216.6582" font-family="sans-serif">usuarios, asignación de roles y la</text><text x="224.27" y="108.1522" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="215.2046" font-family="sans-serif">configuración global del sistema.</text></g><!--reverse link Profesor to Director--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" id="lnk6" data-source-line="13" data-link-type="extension"><path d="M127.644,344.4193 C167.904,340.4693 224.86,334.8669 277.44,329.7069" style="stroke:#181818;stroke-width:1;" fill="none" id="Profesor-backto-Director"/><polygon points="109.73,346.1769,128.2298,350.3906,127.0581,338.448,109.73,346.1769" fill="none" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link Alumno to GMN7--><g class="link" data-entity-1="ent0001" data-entity-2="ent0008" id="lnk9" data-source-line="16" data-link-type="association"><path d="M107.32,529.9469 C134.56,529.9469 179.4,529.9469 222.2,529.9469" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" fill="none" id="Alumno-GMN7"/></g><!--link Profesor to GMN10--><g class="link" data-entity-1="ent0002" data-entity-2="ent0011" id="lnk12" data-source-line="22" data-link-type="association"><path d="M109.73,358.1469 C138.08,367.3869 183.59,382.2269 226.4,396.1869" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" fill="none" id="Profesor-GMN10"/></g><!--link Director to GMN13--><g class="link" data-entity-1="ent0003" data-entity-2="ent0014" id="lnk15" data-source-line="29" data-link-type="association"><path d="M396.71,323.9469 C431.33,323.9469 476.55,323.9469 518.96,323.9469" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;" 