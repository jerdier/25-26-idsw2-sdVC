7,207.1069 L295.3537,197.1069" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="53.9805" x="100.07" y="214.1738">Alumno:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190.2837" x="100.07" y="229.3066">Puede solicitar una dispensa.</text></g><g class="entity" data-entity="GMN14" data-source-line="23" data-uid="ent0015" id="entity_GMN14"><path d="M463.46,53.2469 L463.46,76.9469 L429.1,80.9469 L463.46,84.9469 L463.46,108.6453 A0,0 0 0 0 463.46,108.6453 L791.9468,108.6453 A0,0 0 0 0 791.9468,108.6453 L791.9468,63.2469 L781.9468,53.2469 L463.46,53.2469 A0,0 0 0 0 463.46,53.2469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M781.9468,53.2469 L781.9468,63.2469 L791.9468,63.2469 L781.9468,53.2469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="58.1636" x="469.46" y="70.3138">Profesor:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.4868" x="469.46" y="85.4466">Puede consultar listas de alumnos y dispensas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.7173" x="469.46" y="100.5794">y registrar la asistencia.</text></g><g class="entity" data-entity="GMN17" data-source-line="29" data-uid="ent0018" id="entity_GMN17"><path d="M493.71,181.9769 L493.71,213.2469 L459.03,217.2469 L493.71,221.2469 L493.71,252.5081 A0,0 0 0 0 493.71,252.5081 L791.7154,252.5081 A0,0 0 0 0 791.7154,252.5081 L791.7154,191.9769 L781.7154,181.9769 L493.71,181.9769 A0,0 0 0 0 493.71,181.9769" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M781.7154,181.9769 L781.7154,191.9769 L791.7154,191.9769 L781.7154,181.9769" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.9927" x="499.71" y="199.0438">Director de Grado:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.0054" x="499.71" y="214.1766">Puede hacer todo lo que hace un Profesor,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.9521" x="499.71" y="229.3094">adem&#225;s de revisar y aprobar o rechazar</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.2539" x="499.71" y="244.4422">las dispensas.</text></g><g class="entity" data-entity="GMN20" data-source-line="36" data-uid="ent0021" id="entity_GMN20"><path d="M1011.13,181.9769 L1011.13,213.2469 L976.52,217.2469 L1011.13,221.2469 L1011.13,252.5081 A0,0 0 0 0 1011.13,252.5081 L1296.2814,252.5081 A0,0 0 0 0 1296.2814,252.5081 L1296.2814,191.9769 L1286.2814,181.9769 L1011.13,181.9769 A0,0 0 0 0 1011.13,181.9769" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1286.2814,181.9769 L1286.2814,191.9769 L1296.2814,191.9769 L1286.2814,181.9769" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.8848" x="1017.13" y="199.0438">Secretar&#237;a Acad&#233;mica:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.1514" x="1017.13" y="214.1766">Gestiona matr&#237;culas y listas de alumnos,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.0249" x="1017.13" y="229.3094">y registra/tramita las solicitudes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.812" x="1017.13" y="244.4422">de dispensa de los alumnos.</text></g><g class="entity" data-entity="GMN23" data-source-line="43" data-uid="ent0024" id="entity_GMN23"><path d="M484.59,315.3969 L484.59,354.2269 L449.37,358.2269 L484.59,362.2269 L484.59,401.0609 A0,0 0 0 0 484.59,401.0609 L764.8283,401.0609 A0,0 0 0 0 764.8283,401.0609 L764.8283,325.3969 L754.8283,315.3969 L484.59,315.3969 A0,0 0 0 0 484.59,315.3969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M754.8283,315.3969 L754.8283,325.3969 L764.8283,325.3969 L754.8283,315.3969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.3921" x="490.59" y="332.4638">Administrador del sistema:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.5854" x="490.59" y="347.5966">Puede hacer todo lo que hacen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.2383" x="490.59" y="362.7294">Alumno, Profesor, Director y Secretar&#237;a,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.1621" x="490.59" y="377.8622">adem&#225;s de crear y gestionar usuarios</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.5034" x="490.59" y="392.995">y la configuraci&#243;n general del sistema.</text></g><!--reverse link Profesor to Director--><g class="link" data-entity-1="Profesor" data-entity-2="Director" data-link-type="extension" data-source-line="12" data-uid="lnk7" id="link_Profesor_Director"><path d="M399.71,137.3569 C399.71,155.9869 399.71,160.4369 399.71,179.0369" fill="none" id="Profesor-backto-Director" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="399.71,119.3569,393.71,137.3569,405.71,137.3569,399.71,119.3569" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Director to Admin--><g class="link" data-entity-1="Director" data-entity-2="Admin" data-link-type="extension" data-source-line="13" data-uid="lnk8" id="link_Directo