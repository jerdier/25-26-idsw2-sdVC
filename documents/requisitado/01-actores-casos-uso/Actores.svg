em_Secretaria"><ellipse cx="828.5" cy="190.6094" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M828.5,198.6094 L828.5,225.6094 M815.5,206.6094 L841.5,206.6094 M828.5,225.6094 L815.5,240.6094 M828.5,225.6094 L841.5,240.6094 " fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134" x="761.5" y="256.6426">SecretariaAcademica</text></g><!--entity Admin--><g id="elem_Admin"><ellipse cx="369.5" cy="335.6094" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M369.5,343.6094 L369.5,370.6094 M356.5,351.6094 L382.5,351.6094 M369.5,370.6094 L356.5,385.6094 M369.5,370.6094 L382.5,385.6094 " fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87" x="326" y="401.6426">Administrador</text></g><g id="elem_GMN11"><path d="M88.5,199.6094 L88.5,217.1094 L53.11,221.1094 L88.5,225.1094 L88.5,242.3125 A0,0 0 0 0 88.5,242.3125 L280.5,242.3125 A0,0 0 0 0 280.5,242.3125 L280.5,209.6094 L270.5,199.6094 L88.5,199.6094 A0,0 0 0 0 88.5,199.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M270.5,199.6094 L270.5,209.6094 L280.5,209.6094 L270.5,199.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48" x="94.5" y="218.1045">Alumno:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171" x="94.5" y="234.4561">Puede solicitar una dispensa.</text></g><g id="elem_GMN14"><path d="M432,53.6094 L432,79.1094 L396.83,83.1094 L432,87.1094 L432,112.6641 A0,0 0 0 0 432,112.6641 L731,112.6641 A0,0 0 0 0 731,112.6641 L731,63.6094 L721,53.6094 L432,53.6094 A0,0 0 0 0 432,53.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M721,53.6094 L721,63.6094 L731,63.6094 L721,53.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52" x="438" y="72.1045">Profesor:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278" x="438" y="88.4561">Puede consultar listas de alumnos y dispensas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139" x="438" y="104.8076">y registrar la asistencia.</text></g><g id="elem_GMN17"><path d="M458.5,183.6094 L458.5,217.1094 L423.51,221.1094 L458.5,225.1094 L458.5,259.0156 A0,0 0 0 0 458.5,259.0156 L726.5,259.0156 A0,0 0 0 0 726.5,259.0156 L726.5,193.6094 L716.5,183.6094 L458.5,183.6094 A0,0 0 0 0 458.5,183.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M716.5,183.6094 L716.5,193.6094 L726.5,193.6094 L716.5,183.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106" x="464.5" y="202.1045">Director de Grado:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247" x="464.5" y="218.4561">Puede hacer todo lo que hace un Profesor,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228" x="464.5" y="234.8076">adem&#225;s de revisar y aprobar o rechazar</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="84" x="464.5" y="251.1592">las dispensas.</text></g><g id="elem_GMN20"><path d="M930.5,183.6094 L930.5,217.1094 L895.72,221.1094 L930.5,225.1094 L930.5,259.0156 A0,0 0 0 0 930.5,259.0156 L1188.5,259.0156 A0,0 0 0 0 1188.5,259.0156 L1188.5,193.6094 L1178.5,183.6094 L930.5,183.6094 A0,0 0 0 0 930.5,183.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1178.5,183.6094 L1178.5,193.6094 L1188.5,193.6094 L1178.5,183.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132" x="936.5" y="202.1045">Secretar&#237;a Acad&#233;mica:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237" x="936.5" y="218.4561">Gestiona matr&#237;culas y listas de alumnos,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185" x="936.5" y="234.8076">y registra/tramita las solicitudes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166" x="936.5" y="251.1592">de dispensa de los alumnos.</text></g><g id="elem_GMN23"><path d="M448.5,320.1094 L448.5,362.1094 L413.14,366.1094 L448.5,370.1094 L448.5,411.8672 A0,0 0 0 0 448.5,411.8672 L700.5,411.8672 A0,0 0 0 0 700.5,411.8672 L700.5,330.1094 L690.5,320.1094 L448.5,320.1094 A0,0 0 0 0 448.5,320.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M690.5,320.1094 L690.5,330.1094 L700.5,330.1094 L690.5,320.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155" x="454.5" y="338.6045">Administrador del sistema:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180" x="454.5" y="354.9561">Puede hacer todo lo que hacen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231" x="454.5" y="371.3076">Alumno, Profesor, Director y Secretar&#237;a,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218" x="454.5" y="387.6592">adem&#225;s de crear y gestionar usuarios</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222" x="454.5" y="404.0107">y la configuraci&#243;n general del sistema.</text></g><!--reverse link Profesor to Director--><g id="link_Profesor_Director"><path d="M369.5,140.3594 C369.5,158.8994 369.5,163.1094 369.5,181.6794 " fill="none" id="Profesor-backto-Director" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="none" points="369.5,122.3594,363.5,140.3594,375.5,140.3594,369.5,122.3594" style="stroke:#181818;stroke-width:1.0;"/></g><!--reverse link Director to Admin--><g id="link_Director_Admin"><path d="M369.5,278.4294 C369.5,298.9494 369.5,306.1494 369.5,326.6794 " fill="none" id="Director-backto-Admin" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="none" points="369.5,260.4294,363.5,278.4294,375.5,278.4294,369.5,260.4294" style="stroke:#181818;stroke-width:1.0;"/></g><!--reverse link Secretaria to Admin--><g id="link_Secretaria_Admin"><path d="M744.3999,260.6972 C608.9499,303.6072 560.68,263.1894 430.5,320.1094 C424.59,322.6894 418.71,325.9394 413.06,329.4894 " fill="none" id="Secretaria-backto-Admin" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="none" points="761.19,254.2094,742.2373,255.1004,746.5625,266.2939,761.19,254.2094" style="stroke:#181818;stroke-width:1.0;"/></g><!--reverse link Alumno to Admin--><g id="link_Alumno_Admin"><path d="M66.7831,259.1369 C72.1131,263.8669 64.52,256.4994 70.5,260.1094 C154.13,310.5294 265.53,341.5094 325.99,355.7694 " fill="none" id="Alumno-backto-Admin" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="none" points="53.32,247.1894,62.8006,263.6247,70.7656,254.6492,53.32,247.1894" style="stroke:#181818;stroke-width:1.0;"/></g><!--SRC=[XLF1RXGn3BtdAtm3f1RkYCjAbIfngjGlS3FUtQ1Cl7KIf47y34SEdFY4_J7ix4nckgXm6CdnEC_Fpoybb4YmyuM5CWmK8OTSQ4Hu-uK4vRcUV-4xvmgVe30ySIaymX24V0cSd4Ex2hjOnyJpuK5uJvbbFjwrOfOxkXSS633tr5pnI5wee0JSUHne31wjQaqlNOOn9ALdC68LBU7S6_ZSkUeCuF64FWmAbTr21k3JzzlRjVCIpFaBqjfncxqC1_2Yr2Kk118EnmAyNmI0EVYeqKCbvP8v1XyK4sfISY6VA6LyxoWDO13NG5qywE4AvZdb6WqigWne2mDi3JDC7JpVw8K9X0vDAoqsEMsjoOT_jExQG0-jGTlQok68daIze9kC3C_raj7fEbzhRsiy_sW4XR