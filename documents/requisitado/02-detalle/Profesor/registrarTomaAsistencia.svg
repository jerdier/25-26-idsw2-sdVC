just="spacing" textLength="169" x="91" y="560.7139">Sistema permite introducir</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153" x="264" y="560.7139">el estado de cada alumno.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="91" y="577.0654">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="117" x="91" y="593.417">Profesor introduce</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141" x="212" y="593.417">los cambios necesarios:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165" x="91" y="609.7686">&#8226; Presente / Ausente / Tarde</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140" x="91" y="626.1201">&#8226; Justificaci&#243;n (si aplica)</text></g><g id="SESION_ACTUAL_FINAL"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="223" x="130" y="784.6094"/><line style="stroke:#181818;stroke-width:0.5;" x1="130" x2="353" y1="812.2188" y2="812.2188"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203" x="140" y="804.1426">SESION_ASISTENCIA_ABIERTA</text></g><ellipse cx="241.5" cy="54.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><!--link *start* to SESION_ACTUAL_INICIAL--><g id="link_*start*_SESION_ACTUAL_INICIAL"><path d="M241.5,64.6194 C241.5,78.4994 241.5,99.5794 241.5,119.4494 " fill="none" id="*start*-to-SESION_ACTUAL_INICIAL" style="stroke:#008000;stroke-width:1.0;"/><polygon fill="#008000" points="241.5,125.4494,245.5,116.4494,241.5,120.4494,237.5,116.4494,241.5,125.4494" style="stroke:#008000;stroke-width:1.0;"/></g><!--link SESION_ACTUAL_INICIAL to PROCESO_TOMA_COMP--><g id="link